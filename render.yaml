# Render blueprint (Plan_v2 P1-A4/A5). Backend runs from the multi-stage Docker
# image; CI triggers deploys via a Render deploy hook (autoDeploy off to avoid
# double-deploying on every push).
services:
  - type: web
    name: opportunity-copilot-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false

  - type: web
    name: opportunity-copilot-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeploy: false
    envVars:
      - key: VITE_API_URL
        sync: false
