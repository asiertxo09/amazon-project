name: CI

# Lint → typecheck → test → build images → deploy on merge to main (Plan_v2 P1-A5).
# A red suite blocks the deploy job (needs: [...] gating).

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, type, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.27"
          enable-cache: true

      - name: Sync (locked, with dev extras)
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check backend

      - name: Ruff format check
        run: uv run ruff format --check backend

      - name: Mypy
        run: uv run mypy backend

      - name: Pytest + coverage
        run: uv run pytest --cov=backend --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend — lint, type, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker:
    name: Build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: opportunity-copilot-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: opportunity-copilot-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [docker]
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') }}
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy." >&2
            exit 0
          fi
          curl -fsSL -X POST "${RENDER_DEPLOY_HOOK_URL}"
          echo "Render deploy triggered."
